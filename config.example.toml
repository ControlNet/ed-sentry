# Example config for ed-sentry.
# CLI flags override this file. Missing keys keep the defaults shown here.
# Copy this file to config.toml for local settings. Do not commit config.toml.

[journal]
# Empty folder uses the Windows Saved Games known folder, including system folder moves.
# On Linux, pass --journal or set this to an explicit Elite Dangerous folder.
folder = ""
recent_files = 10

[monitor]
use_utc = false
live_status = true
dynamic_title = true
warn_kill_rate = 20
warn_kill_rate_delay_minutes = 5
warn_no_kills_minutes = 20
warn_no_kills_initial_minutes = 5
warn_cooldown_minutes = 30
# Retained for future remote delivery; Phase 1 terminal output does not suppress duplicates.
duplicate_max = 5
pirate_names = false
bounty_faction = false
bounty_value = false
extended_stats = false
min_scan_level = 1
poll_interval_ms = 1000

[log_levels]
# Levels: 0 off, 1 notify, 2+ notify and Matrix mention.
scan_incoming = 1
scan_easy = 1
scan_hard = 1
kill_easy = 1
kill_hard = 1
fighter_hull = 1
fighter_down = 2
ship_shields = 1
ship_hull = 1
died = 2
cargo_lost = 2
bait_value_low = 1
security_scan = 1
security_attack = 1
fuel_report = 1
fuel_low = 2
fuel_critical = 2
missions = 1
missions_all = 2
merits = 0
rank_promotion = 2
no_kills = 2
kill_rate = 1
summary_kills = 1
summary_faction = 0
summary_scans = 0
summary_bounties = 1
summary_merits = 1
# Retained for future remote duplicate-suppression notices; inactive for Phase 1 terminal output.
duplicate_suppression = 1

[web]
# WebUI is disabled by default. Set enabled = true to start it in watch-capable
# CLI and desktop runtimes; replay remains terminal-only.
enabled = false
# Keep the default loopback bind for local-only access.
# Config editing is allowed only on loopback binds in the first milestone.
# Non-localhost binds warn at startup and are intended for deliberate advanced use only.
host = "127.0.0.1"
port = 8765
open_browser = false

[matrix]
# Matrix delivery requires an unencrypted room; E2EE/end-to-end encrypted rooms are unsupported.
enabled = false
homeserver = "https://matrix.example.org"
user_id = "@ed-sentry:example.org"
room_id = "!roomid:example.org"
# A room alias like "#alerts:example.org" is also accepted.
access_token = "<token>"
# Optional Matrix user ID to mention for log levels 2 and higher.
mention_user_id = ""
status_update_interval_seconds = 60
