# Phase 1 example config for ed-afk-monitor.
# CLI flags override this file. Missing keys keep the defaults shown here.
# Matrix, Discord, WebUI, EDMC, and automation settings are not active Phase 1 config.

[journal]
# Empty folder uses the Windows Saved Games known folder, including system folder moves.
# On Linux, pass --journal or set this to an explicit Elite Dangerous folder.
folder = ""
recent_files = 10

[monitor]
use_utc = false
live_status = true
dynamic_title = true
warn_kill_rate = 20
warn_kill_rate_delay_minutes = 5
warn_no_kills_minutes = 20
warn_no_kills_initial_minutes = 5
warn_cooldown_minutes = 30
# Retained for future remote delivery; Phase 1 terminal output does not suppress duplicates.
duplicate_max = 5
pirate_names = false
bounty_faction = false
bounty_value = false
extended_stats = false
min_scan_level = 1
poll_interval_ms = 1000

[log_levels]
# Phase 1 levels: 0 ignore, 1 terminal, 2 terminal plus future remote, 3 terminal plus future mention.
scan_incoming = 1
scan_easy = 1
scan_hard = 2
kill_easy = 2
kill_hard = 2
fighter_hull = 2
fighter_down = 3
ship_shields = 3
ship_hull = 3
died = 3
cargo_lost = 3
bait_value_low = 2
security_scan = 2
security_attack = 3
fuel_report = 1
fuel_low = 2
fuel_critical = 3
missions = 2
missions_all = 3
merits = 0
no_kills = 3
kill_rate = 3
summary_kills = 2
summary_faction = 0
summary_scans = 0
summary_bounties = 2
summary_merits = 2
# Retained for future remote duplicate-suppression notices; inactive for Phase 1 terminal output.
duplicate_suppression = 1
