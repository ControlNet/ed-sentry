name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Add Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install Windows packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            zip

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            ui/src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Sync and check release version
        id: version
        run: |
          VERSION=$(node scripts/sync-release-version.mjs --print-version)
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          node scripts/sync-release-version.mjs --check-tag "${{ github.ref_name }}"

      - name: Run release contract tests
        run: node --test scripts/*.test.mjs

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --all

      - name: Run frontend lint
        run: pnpm --dir ui lint

      - name: Package Linux artifact
        run: scripts/package-linux-x64.sh

      - name: Verify Linux packaged WebUI root
        run: scripts/verify-packaged-webui.sh dist/ed-sentry dist/packaged-webui-root.http

      - name: Package Windows artifact
        run: scripts/package-windows-gnu.sh

      - name: Write checksums
        run: |
          sha256sum \
            dist/ed-sentry-v${{ steps.version.outputs.version }}-linux-x64.zip \
            dist/ed-sentry-v${{ steps.version.outputs.version }}-windows-x64.zip \
            > dist/checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ED Sentry v${{ steps.version.outputs.version }}
          body: |
            Download the zip for your platform, unzip it, then run ED Sentry.

            - Windows: ed-sentry-v${{ steps.version.outputs.version }}-windows-x64.zip
            - Linux: ed-sentry-v${{ steps.version.outputs.version }}-linux-x64.zip
          files: |
            dist/ed-sentry-v${{ steps.version.outputs.version }}-windows-x64.zip
            dist/ed-sentry-v${{ steps.version.outputs.version }}-linux-x64.zip
            dist/checksums.txt
          fail_on_unmatched_files: true
