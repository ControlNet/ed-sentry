name: Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: x86_64-unknown-linux-gnu
            artifact_name: ed-sentry-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target_name: x86_64-pc-windows-msvc
            artifact_name: ed-sentry-x86_64-pc-windows-msvc.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Build WebUI assets
        run: pnpm --dir ui build

      - name: Build release binary
        run: cargo build --release

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/ed-sentry/webui
          cp target/release/ed-sentry dist/ed-sentry/ed-sentry
          cp config.example.toml dist/ed-sentry/config.toml
          cp -R ui/dist/. dist/ed-sentry/webui/
          test -f dist/ed-sentry/webui/index.html
          tar -czf ed-sentry-x86_64-unknown-linux-gnu.tar.gz -C dist ed-sentry

      - name: Verify Linux packaged WebUI root
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/verify-packaged-webui.sh dist/ed-sentry dist/packaged-webui-root.http

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\ed-sentry\webui
          Copy-Item target\release\ed-sentry.exe dist\ed-sentry\ed-sentry.exe
          Copy-Item config.example.toml dist\ed-sentry\config.toml
          Copy-Item ui\dist\* dist\ed-sentry\webui -Recurse
          if (!(Test-Path dist\ed-sentry\webui\index.html)) { throw "Missing packaged WebUI index.html" }
          Compress-Archive -Path dist\ed-sentry -DestinationPath ed-sentry-x86_64-pc-windows-msvc.zip -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error
